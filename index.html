<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=5" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Registra, revive y comparte tus aventuras — Keeptrip" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <title>Keeptrip</title>
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://keeptrip.app/" />
    <meta property="og:title" content="Keeptrip — Tu pasaporte digital" />
    <meta property="og:description" content="Transforma tus rutas, fotos y destinos en una bitácora viva. Comparte tus aventuras con el mundo." />
    <meta property="og:image" content="https://keeptrip.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Keeptrip" />
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://keeptrip.app/" />
    <meta property="twitter:title" content="Keeptrip — Tu pasaporte digital" />
    <meta property="twitter:description" content="Transforma tus rutas, fotos y destinos en una bitácora viva. Comparte tus aventuras con el mundo." />
    <meta property="twitter:image" content="https://keeptrip.app/og-image.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://keeptrip-app-staging.firebaseapp.com" crossorigin />
    <link rel="preconnect" href="https://apis.google.com" crossorigin />
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />
    <style>
      body {
        margin: 0;
        background-color: #F8FAFC;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
      #keeptrip-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #F8FAFC;
        pointer-events: none;
      }
      .splash-logo {
        width: 164px;
        height: 164px;
        will-change: transform;
        animation: pulseSplash 2.5s ease-in-out infinite;
      }
      .splash-spinner {
        margin-top: 24px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid #E2E8F0;
        border-top-color: #FF6B35;
        will-change: transform;
        animation: spinSplash 0.7s linear infinite;
      }
      @keyframes pulseSplash {
        0% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); opacity: 0.85; }
      }
      @keyframes spinSplash {
        to { transform: rotate(360deg); }
      }
      #keeptrip-splash[aria-hidden="true"] .splash-logo {
        animation: none;
      }
    </style>
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@500&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@500&display=swap"
      />
    </noscript>
    <script>
      window.addEventListener('load', function () {
        var emojiFont = document.createElement('link');
        emojiFont.rel = 'stylesheet';
        emojiFont.href = 'https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap';
        document.head.appendChild(emojiFont);
      });
    </script>
  </head>
  <body>
    <div id="keeptrip-splash">
      <img src="/favicon.svg" alt="Keeptrip Logo" class="splash-logo" />
      <div class="splash-spinner" aria-hidden="true"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
